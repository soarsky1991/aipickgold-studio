server {
    listen 80;
    server_name aipickgold.com www.aipickgold.com wxmd.aipickgold.com tools.aipickgold.com;

    if ($host = aipickgold.com) {
        return 301 https://codex.aipickgold.com$request_uri;
    }

    if ($host = www.aipickgold.com) {
        return 301 https://codex.aipickgold.com$request_uri;
    }

    if ($host = wxmd.aipickgold.com) {
        return 301 https://tools.aipickgold.com$request_uri;
    }

    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name aipickgold.com www.aipickgold.com;

    ssl_certificate /etc/letsencrypt/live/www.aipickgold.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/www.aipickgold.com/privkey.pem;

    return 301 https://codex.aipickgold.com$request_uri;
}

server {
    listen 443 ssl;
    server_name wxmd.aipickgold.com;

    ssl_certificate /etc/letsencrypt/live/www.aipickgold.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/www.aipickgold.com/privkey.pem;

    return 301 https://tools.aipickgold.com$request_uri;
}

server {
    listen 443 ssl;
    server_name tools.aipickgold.com;

    ssl_certificate /etc/letsencrypt/live/www.aipickgold.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/www.aipickgold.com/privkey.pem;

    access_log /var/log/nginx/md2wx-access.log sanitized;

    location /_next/static {
        alias /opt/md2wx-app/.next/standalone/.next/static;
        expires 365d;
    }

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}
