# Add these locations before the catch-all `location /` in the
# aipickgold.com / www.aipickgold.com server block.
#
# This keeps the existing WxMD/CardMD Next.js product intact while giving the
# main domain a stable Codex learning entry.

location = /codex {
    return 302 https://codex.aipickgold.com/;
}

location ^~ /codex/ {
    return 302 https://codex.aipickgold.com$request_uri;
}

# In the proxied `location /`, keep the existing proxy settings and add this
# small HTML injection. It gives the old standalone Next.js homepage a visible
# Codex learning tag without rebuilding the main WxMD/CardMD app.
#
# Place these directives after `proxy_cache_bypass $http_upgrade;`.

proxy_set_header Accept-Encoding "";
sub_filter_once on;
sub_filter '<body class="min-h-full flex flex-col">' '<body class="min-h-full flex flex-col"><a class="aipg-codex-tab" href="https://codex.aipickgold.com/" style="position:fixed;left:14px;bottom:14px;z-index:2147483647;display:inline-flex;align-items:center;gap:6px;padding:9px 12px;border-radius:999px;background:#101820;color:#f5d36b;text-decoration:none;font:600 13px/1 -apple-system,BlinkMacSystemFont,Segoe UI,sans-serif;box-shadow:0 10px 30px rgba(0,0,0,.18);border:1px solid rgba(245,211,107,.45);">Codex 学习</a>';
