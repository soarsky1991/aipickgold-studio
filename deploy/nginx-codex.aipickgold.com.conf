server {
    listen 80;
    server_name codex.aipickgold.com;

    root /var/www/aipickgold-codex;
    index index.html;

    access_log /var/log/nginx/aipickgold-codex-access.log sanitized;
    error_log /var/log/nginx/aipickgold-codex-error.log;

    location /assets/ {
        try_files $uri =404;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
