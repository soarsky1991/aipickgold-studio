server {
    listen 80;
    server_name codex.aipickgold.com;

    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name codex.aipickgold.com;

    ssl_certificate /etc/letsencrypt/live/codex.aipickgold.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/codex.aipickgold.com/privkey.pem;

    root /var/www/aipickgold-codex;
    index index.html;

    access_log /var/log/nginx/aipickgold-codex-access.log sanitized;
    error_log /var/log/nginx/aipickgold-codex-error.log;

    location /assets/ {
        try_files $uri =404;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    location = /codex {
        try_files /index.html =404;
    }

    location = /codex/ {
        try_files /index.html =404;
    }

    location = /founder {
        try_files /index.html =404;
    }

    location = /founder/ {
        try_files /index.html =404;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
